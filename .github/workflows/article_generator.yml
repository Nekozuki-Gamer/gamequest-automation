name: 記事自動生成（毎日3回）

on:
  schedule:
    - cron: '30 0 * * *'  # JST 9:30 (UTC 00:30)
    - cron: '30 6 * * *'  # JST 15:30 (UTC 06:30)
    - cron: '30 12 * * *'  # JST 21:30 (UTC 12:30)
  workflow_dispatch:

jobs:
  generate-articles:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests firebase-admin anthropic
      - name: 記事自動生成実行
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python gamequest-automation/scripts/article_generator.py
