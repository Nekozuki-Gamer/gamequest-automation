name: Steam ゲーム自動追加（毎日2回）

on:
  schedule:
    - cron: '0 0 * * *'  # JST 9:00 (UTC 00:00)
    - cron: '0 12 * * *'  # JST 21:00 (UTC 12:00)
  workflow_dispatch:

jobs:
  add-steam-games:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests firebase-admin anthropic
      - name: Steam ゲーム自動追加実行
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python gamequest-automation/scripts/steam_auto_add.py
